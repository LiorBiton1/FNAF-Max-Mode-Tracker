<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FNAF Max Mode Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-row">
      <div>
        <h1>FNAF Max Mode Tracker</h1>
        <p class="subtitle">Track your completions — no submission to fnafmml.com</p>
      </div>
      <div class="auth-area">
        <div id="auth-guest" class="auth-guest">
          <button type="button" class="auth-btn" id="auth-show-btn">Login / Register</button>
        </div>
        <div id="auth-logged" class="auth-logged hidden">
          <span class="auth-username" id="auth-username"></span>
          <button type="button" class="auth-btn auth-btn-outline" id="auth-logout-btn">Logout</button>
        </div>
      </div>
    </div>

    <div id="auth-modal" class="auth-modal hidden">
      <div class="auth-modal-backdrop"></div>
      <div class="auth-modal-content">
        <h2>Login or Register</h2>
        <p class="auth-hint">Create an account to save completions to the database.</p>
        <form id="auth-form" class="auth-form">
          <input type="text" id="auth-username-input" placeholder="Username" required minlength="2" autocomplete="username">
          <input type="password" id="auth-password-input" placeholder="Password (min 6)" required minlength="6" autocomplete="current-password">
          <p id="auth-error" class="auth-error hidden"></p>
          <div class="auth-actions">
            <button type="submit" name="action" value="login" class="auth-btn">Login</button>
            <button type="submit" name="action" value="register" class="auth-btn auth-btn-outline">Register</button>
          </div>
        </form>
        <button type="button" class="auth-close" id="auth-close-btn" aria-label="Close">&times;</button>
      </div>
    </div>

    <div class="tabs">
      <button type="button" class="tab active" id="tab-ml" data-list="ml">Main List</button>
      <button type="button" class="tab" id="tab-ul" data-list="ul">Unlimited List</button>
    </div>

    <div class="progress-area">
      <span id="header-progress" class="progress-text">0 / 0 completed</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="controls">
      <div class="search-box">
        <input type="search" id="search-input" placeholder="Search (title, game, creator)..." aria-label="Search maxmodes">
        <button type="button" id="search-btn">Search</button>
      </div>
      <div class="pagination">
        <button type="button" class="page-btn" id="pagination-prev" disabled>Previous</button>
        <span id="pagination-info" class="page-info">Page 1 of 1</span>
        <button type="button" class="page-btn" id="pagination-next">Next</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="card-container" class="card-container"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
